<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Downloader Premium</title>
    <style>
        :root { --bg: #0a0a0a; --surf: #1a1a1a; --bord: #333; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 400px; text-align: center; margin-top: 10vh; }
        input { width: 100%; padding: 16px; background: var(--surf); border: 1px solid var(--bord); border-radius: 12px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; }
        .btn-search { background: #fff; color: #000; margin-bottom: 20px; }
        .preview { background: var(--surf); border: 1px solid var(--bord); border-radius: 16px; padding: 15px; display: none; }
        .preview img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .btn-dl { background: transparent; border: 1px solid var(--bord); color: #fff; }
        #status { margin-top: 15px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h2>CnTube Pro</h2>
        <input type="text" id="url" placeholder="Cole o link do YouTube...">
        <button class="btn-search" id="searchBtn">BUSCAR</button>
        <div id="status"></div>
        <div class="preview" id="preview">
            <img id="thumb">
            <p id="title" style="font-size: 0.9rem;"></p>
            <button class="btn-dl" id="dlBtn">BAIXAR MP4</button>
        </div>
    </div>
    <script>
        const sBtn = document.getElementById('searchBtn');
        const dBtn = document.getElementById('dlBtn');
        const status = document.getElementById('status');
        
        sBtn.onclick = async () => {
            status.innerText = "Buscando...";
            try {
                const res = await fetch(`/info?url=${encodeURIComponent(document.getElementById('url').value)}`);
                const data = await res.json();
                document.getElementById('thumb').src = data.thumbnail;
                document.getElementById('title').innerText = data.title;
                document.getElementById('preview').style.display = 'block';
                status.innerText = "";
            } catch (e) { status.innerText = "Erro ao buscar."; }
        };

        dBtn.onclick = () => {
            const videoUrl = document.getElementById('url').value;
            status.innerText = "O download iniciará em instantes...";
            // Método direto para evitar 0KB no Safari
            window.location.href = `/download?url=${encodeURIComponent(videoUrl)}`;
        };
    </script>
</body>
</html>
