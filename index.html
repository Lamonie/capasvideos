<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader Premium</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface-color: #1a1a1a;
            --border-color: #333333;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; text-align: center; margin-top: 5vh; }
        input {
            width: 100%; padding: 15px; background: var(--bg-color);
            border: 1px solid var(--border-color); border-radius: 8px;
            color: #fff; margin-bottom: 15px; box-sizing: border-box;
        }
        button.primary {
            width: 100%; padding: 15px; background: #fff; color: #000;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .preview-area {
            background: var(--surface-color); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 15px; margin-top: 20px; display: none;
        }
        .preview-area img { width: 100%; border-radius: 8px; margin-bottom: 15px; }
        button.download-btn {
            width: 100%; padding: 15px; background: var(--surface-color);
            border: 1px solid var(--border-color); color: #fff; border-radius: 8px; font-weight: bold;
        }
        #status { margin-top: 15px; font-size: 0.9rem; color: #a1a1aa; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Baixar Vídeo</h1>
        <p>Design Premium - Sem Emojis</p>

        <input type="text" id="urlInput" placeholder="Cole o link do YouTube aqui...">
        <button class="primary" id="searchBtn">BUSCAR VÍDEO</button>

        <div id="status"></div>

        <div class="preview-area" id="previewArea">
            <img id="thumbnail" alt="Capa">
            <div id="videoTitle" style="margin-bottom: 15px; font-weight: 600;"></div>
            <button class="download-btn" id="dlBtn">BAIXAR AGORA (MP4)</button>
        </div>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const dlBtn = document.getElementById('dlBtn');
        const urlInput = document.getElementById('urlInput');
        const statusDiv = document.getElementById('status');
        const previewArea = document.getElementById('previewArea');

        searchBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) return;

            statusDiv.textContent = "Buscando informações...";
            searchBtn.disabled = true;

            try {
                const response = await fetch(`/api/info?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                document.getElementById('thumbnail').src = data.thumbnail;
                document.getElementById('videoTitle').textContent = data.title;
                previewArea.style.display = 'block';
                statusDiv.textContent = "";
            } catch (error) {
                statusDiv.textContent = "Erro ao buscar vídeo. Verifique o link.";
            } finally {
                searchBtn.disabled = false;
            }
        });

        dlBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            statusDiv.textContent = "O download iniciará na barra azul do Safari...";
            window.location.href = `/api/download?url=${encodeURIComponent(url)}`;
        });
    </script>
</body>
</html>
